  return `<div class="ai-insight"><div class="ai-insight-hd">${I.spark}<span>AI analysis complete</span></div><p><strong>${matched}/${total} requirements matched.</strong> ${gaps} gaps: Robert Chen's proof of address and source of wealth. ${expiring} document expiring (David Park's passport, 28 days).</p></div>
  <div class="card" style="margin-bottom:16px;padding:16px 20px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:13.5px;font-weight:600">${matched} of ${total} requirements satisfied</span><span class="tag t-warning">${Math.round(matched/total*100)}% complete</span></div><div class="pbar" style="height:8px"><div class="pfill" style="width:${matched/total*100}%;background:var(--warning)"></div></div><div style="display:flex;gap:16px;margin-top:10px;font-size:11.5px"><span style="color:var(--green)">● ${matched} matched</span><span style="color:var(--red)">● ${gaps} gaps</span><span style="color:var(--warning)">● ${expiring} expiring</span></div></div>
  ${cats.map(cat=>{const reqs=requirements.filter(r=>r.cat===cat);const cm=reqs.filter(r=>r.status==='matched').length;return `<div class="card" style="margin-bottom:12px"><div class="card-hd"><div><div class="card-title">${cat}</div><div class="card-sub">${cm}/${reqs.length} satisfied</div></div><div class="pbar" style="width:120px;height:5px"><div class="pfill" style="width:${cm/reqs.length*100}%;background:${cm===reqs.length?'var(--green)':'var(--warning)'}"></div></div></div>
  ${reqs.map(r=>`<div class="req-row">${reqIcon(r.status)}<div class="req-info"><div class="req-name">${r.name}</div>${r.value?`<div class="req-match-val">${r.value}</div>`:''}${r.doc?`<div style="display:flex;align-items:center;gap:6px;margin-top:4px"><span style="color:var(--td);font-size:11px;cursor:pointer" onclick="go({modal:'doc'})">📄 ${r.doc}</span>${r.docExpiry?`<span style="font-size:10px;color:${r.status==='expiring'?'var(--warning)':'var(--txt3)'}">Exp: ${r.docExpiry}</span>`:''}</div>`:''}${r.source?`<div class="doc-source" style="margin-top:3px">${I.link} <span>Source: ${r.source}</span></div>`:''}${r.docSource?`<div class="doc-source" style="margin-top:3px">${I.link} <span>${r.docSource}</span></div>`:''}${r.gapReason?`<div style="font-size:11px;color:var(--red);margin-top:4px">${r.gapReason}</div>`:''}${r.action?`<div style="font-size:11px;color:var(--td);margin-top:3px;font-weight:500">${r.action}</div>`:''}${r.note?`<div style="font-size:10.5px;color:var(--warning);margin-top:3px;font-weight:500">⚠ ${r.note}</div>`:''}${r.confidence?`<div style="font-size:10px;color:var(--txt3);margin-top:3px">AI confidence: ${r.confidence}%</div>`:''}</div><div class="req-actions">${reqTag(r.status)}</div></div>`).join('')}</div>`}).join('')}
  <div style="display:flex;justify-content:space-between;margin-top:16px"><button class="btn btn-s" onclick="go({requestStep:'email'})">← Back to email</button><button class="btn btn-p" onclick="go({requestStep:'response'})">${I.send} Review draft response →</button></div>`;
}
function reqResponse(){
  const cats=[...new Set(requirements.map(r=>r.cat))];
  const attachable=requirements.filter(r=>r.doc&&r.status!=='gap');
  return `<div class="ai-insight"><div class="ai-insight-hd">${I.spark}<span>Response drafted</span></div><p>Structured response assembled. ${matched} items ready, ${gaps} pending (Robert Chen's address proof and source of wealth). Send partial now or wait for updates.</p></div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px"><div class="card" style="padding:14px;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--green)">${matched}</div><div style="font-size:11px;color:var(--txt3)">Ready to send</div></div><div class="card" style="padding:14px;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--red)">${gaps}</div><div style="font-size:11px;color:var(--txt3)">Pending action</div></div><div class="card" style="padding:14px;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--warning)">${expiring}</div><div style="font-size:11px;color:var(--txt3)">Expiring soon</div></div></div>
  ${cats.map(cat=>{const reqs=requirements.filter(r=>r.cat===cat);return `<div class="response-section"><div class="response-section-hd"><div class="sec-title">${I.file} ${cat} <span class="tag t-${reqs.every(r=>r.status==='matched')?'green':'warning'}" style="margin-left:8px">${reqs.filter(r=>r.status==='matched').length}/${reqs.length}</span></div></div><div class="response-section-body">${reqs.map(r=>`<div class="response-field"><span class="f-label">${r.name.length>45?r.name.substring(0,45)+'...':r.name}</span>${r.status==='gap'?`<span class="f-value missing">⚠ ${(r.gapReason||'Pending').substring(0,60)}</span>`:r.doc?`<span class="f-value" style="display:flex;align-items:center;gap:6px"><span style="color:var(--td);cursor:pointer;font-size:12px" onclick="go({modal:'doc'})">📄 ${r.doc}</span><span class="tag t-green" style="font-size:9px">Attached</span></span>`:`<span class="f-value">${r.value||'—'}</span>`}</div>`).join('')}</div></div>`}).join('')}
  <div class="card" style="margin-top:16px"><div class="card-hd"><div><div class="card-title">Attached documents (${attachable.length})</div><div class="card-sub">Click to preview before sending</div></div></div>${attachable.map(r=>`<div class="doc-card" onclick="go({modal:'doc'})"><div class="doc-icon" style="background:${r.status==='expiring'?'var(--warning-bg)':'var(--teal-bg)'}">${I.fileText.replace('currentColor',r.status==='expiring'?'var(--warning)':'var(--teal)')}</div><div class="doc-info"><div class="doc-name">${r.doc}</div><div class="doc-meta">${r.cat}${r.docExpiry?' · Exp: '+r.docExpiry:''}</div>${r.docSource?`<div class="doc-source">${I.link} ${r.docSource}</div>`:''}</div><span class="tag t-${r.status==='expiring'?'warning':'green'}">${r.status==='expiring'?'Expiring':'Valid'}</span><button class="btn btn-g btn-sm">${I.eye}</button></div>`).join('')}</div>
  <div style="display:flex;justify-content:space-between;margin-top:20px"><button class="btn btn-s" onclick="go({requestStep:'analysis'})">← Back to analysis</button><div style="display:flex;gap:8px"><button class="btn btn-s">${I.download} Export PDF</button><button class="btn btn-success">${I.send} Send response to HSBC</button></div></div>`;
}

// ---- MODAL ----
function renderModal(){
  if(!S.modal) return '';
  const d=S.modalData?documents.find(dc=>dc.id===S.modalData):documents[2];
  return `<div class="modal-overlay" onclick="go({modal:null,modalData:null})"><div class="modal fade-in" onclick="event.stopPropagation()"><div class="modal-hd"><h2>Document preview</h2><button class="close-btn" onclick="go({modal:null,modalData:null})">${I.x}</button></div><div class="modal-body">
  <div style="text-align:center;padding:40px 20px;background:var(--bg);border-radius:var(--rs);margin-bottom:16px"><div style="font-size:48px;margin-bottom:12px">📄</div><div style="font-size:14px;font-weight:600">${d.name}</div><div style="font-size:12px;color:var(--txt3);margin-top:4px">PDF · ${d.size} · ${d.pages} pages</div><div style="font-size:11px;color:var(--txt3);margin-top:8px">Preview renders here in production</div></div>
  <div class="detail-grid" style="grid-template-columns:120px 1fr;font-size:12.5px"><span class="dl">Type</span><span class="dv">${d.type}</span><span class="dl">Entity</span><span class="dv">${d.entity}</span><span class="dl">Source</span><span class="dv">${d.source}</span><span class="dl">Uploaded</span><span class="dv">${d.uploaded}</span><span class="dl">Expires</span><span class="dv">${d.expires||'No expiry'}</span><span class="dl">Classification</span><span class="dv"><span class="tag t-${d.classification.includes('AI')?'teal':'gray'}">${d.classification}</span></span><span class="dl">Status</span><span class="dv">${statusTag(d.status)}</span></div>
  </div><div class="modal-ft"><button class="btn btn-s">${I.download} Download</button><button class="btn btn-s">${I.refresh} Request update</button><button class="btn btn-p">${I.eye} Full preview</button></div></div></div>`;
}

// ============ SIDEBAR / TOPBAR / RENDER ============
function renderSidebar(){
  const items=[{id:'dashboard',icon:I.dash,label:'Dashboard'},{id:'request',icon:I.mail,label:'Bank requests',badge:3},{id:'entities',icon:I.building,label:'Entities'},{id:'people',icon:I.users,label:'People'},{id:'documents',icon:I.file,label:'Documents',badge:5},{id:'banks',icon:I.bank,label:'Bank access'},{id:'notifications',icon:I.bell,label:'Notifications',badge:notifications.filter(n=>!n.read).length},{id:'settings',icon:I.settings,label:'Settings'}];
  const active=S.page;
  return `<div class="sidebar"><div class="sidebar-logo"><div style="width:28px;height:28px;border-radius:8px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0">V</div><span>Vervo AI</span></div><div class="sidebar-nav"><div class="sidebar-section">Main</div>${items.slice(0,6).map(i=>`<div class="nav-item ${active===i.id||(active==='request'&&i.id==='request')?'active':''}" onclick="go({page:'${i.id}'${i.id==='request'?",requestStep:'email'":''}${i.id==='entities'?",entityDetail:null":''}${i.id==='people'?",personDetail:null":''}})"><span style="display:flex">${i.icon}</span><span>${i.label}</span>${i.badge?`<span class="nav-badge">${i.badge}</span>`:''}</div>`).join('')}<div class="sidebar-section">System</div>${items.slice(6).map(i=>`<div class="nav-item ${active===i.id?'active':''}" onclick="go({page:'${i.id}'})"><span style="display:flex">${i.icon}</span><span>${i.label}</span>${i.badge?`<span class="nav-badge">${i.badge}</span>`:''}</div>`).join('')}</div><div class="sidebar-ai"><div class="ai-btn" onclick="go({aiOpen:!S.aiOpen})"><div class="ai-icon">${I.spark.replace('currentColor','#fff')}</div><div class="ai-btn-text"><strong>AI Assistant</strong>3 insights waiting</div></div></div></div>`;
}
function renderTopbar(){
  const t={dashboard:'Dashboard',request:'Bank Request — HSBC',entities:'Entities',people:'People & Ownership',documents:'Document Vault',banks:'Bank Relationships',notifications:'Notifications',settings:'Settings'};
  return `<div class="topbar"><div class="topbar-title">${t[S.page]||'Dashboard'}</div><div class="topbar-spacer"></div><div class="search-box">${I.search}<input placeholder="Search entities, people, documents..."></div><div class="topbar-icon" onclick="go({page:'notifications'})">${I.bell}<div class="dot"></div></div><div class="avatar">SC</div></div>`;
}
function renderAI(){
  if(!S.aiOpen) return '';
  return `<div class="aip open"><div class="aip-h"><div class="ai-icon">${I.spark.replace('currentColor','#fff')}</div><div style="flex:1"><div style="font-size:15px;font-weight:600">Vervo AI</div><div style="font-size:12px;color:var(--txt3)">Powered by LLM · Context-aware</div></div><button class="close-btn" onclick="go({aiOpen:false})">${I.x}</button></div>
  <div class="aip-b">
    <div class="aim aim-b"><div class="aim-av">${I.spark.replace('currentColor','#fff')}</div><div class="aim-bb">Hi Sarah. I'm monitoring your KYC landscape. Here's what needs attention:<br><br><strong>1.</strong> HSBC's new request is 91% automatable — I can draft the response now.<br><strong>2.</strong> 3 documents expire this month.<br><strong>3.</strong> Meridian LATAM needs LEI registration for Chile.<br><strong>4.</strong> MH Property SPV 2 is only 31% ready — 12 requirements missing.<br><br>What would you like to tackle first?</div></div>
    <div class="ai-sg"><div class="ai-ch" onclick="go({page:'request',requestStep:'analysis',aiOpen:false})">Process HSBC request</div><div class="ai-ch">Draft expiry reminders</div><div class="ai-ch">Chile gap report</div><div class="ai-ch">What's my overall status?</div></div>
    <div class="aim aim-u" style="margin-top:14px"><div class="aim-bb">Process the HSBC request for me</div></div>
    <div class="aim aim-b" style="margin-top:14px"><div class="aim-av">${I.spark.replace('currentColor','#fff')}</div><div class="aim-bb">I've parsed HSBC's email and identified <strong>34 requirements</strong> for the annual review of Meridian Holdings Group.<br><br>✅ <strong>31 matched</strong> to existing documents and data in your vault<br>❌ <strong>3 gaps</strong>: Robert Chen's proof of address, source of wealth declaration, and David Park's passport (expiring in 28 days)<br><br>I've already sent self-service requests to Robert Chen. I can draft the source of wealth form for his review. Shall I proceed?</div></div>
    <div class="ai-sg"><div class="ai-ch" onclick="go({page:'request',requestStep:'response',aiOpen:false})">Yes, proceed</div><div class="ai-ch" onclick="go({page:'request',requestStep:'analysis',aiOpen:false})">Show me the mapping</div><div class="ai-ch">Change response tone</div></div>
  </div>
  <div class="aip-in"><input placeholder="Ask anything about your KYC data..." onkeydown="if(event.key==='Enter')event.target.value=''"><button class="btn btn-p">${I.send}</button></div></div>`;
}
function render(){
  const p={dashboard:pgDashboard,request:pgRequest,entities:pgEntities,people:pgPeople,documents:pgDocuments,banks:pgBanks,notifications:pgNotifications,settings:pgSettings};
  document.getElementById('app').innerHTML=`${renderSidebar()}<div class="main">${renderTopbar()}<div class="content fade-in">${(p[S.page]||pgDashboard)()}</div></div>${renderModal()}${renderAI()}`;
}
render();
</script>
</body>
</html>
