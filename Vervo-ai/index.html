<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vervo AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230EA5E9'/><text x='16' y='22' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='18' fill='white'>V</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0A1628;
      color: #F8FAFC;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* === AI ORB === */
    .orb-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        rgba(14, 165, 233, 0.25) 0%,
        rgba(14, 165, 233, 0.08) 40%,
        rgba(14, 165, 233, 0.02) 70%,
        transparent 100%
      );
      animation: orb-breathe 6s ease-in-out infinite;
    }

    .orb::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      border: 1px solid rgba(14, 165, 233, 0.12);
      animation: orb-breathe 6s ease-in-out infinite reverse;
    }

    .orb::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.4) 0%, transparent 70%);
      filter: blur(8px);
      animation: core-pulse 3s ease-in-out infinite;
    }

    /* Orbital rings */
    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      border: 1px solid rgba(14, 165, 233, 0.06);
    }
    .ring-1 {
      width: 280px; height: 280px;
      transform: translate(-50%, -50%) rotateX(65deg) rotateZ(0deg);
      animation: orbit 20s linear infinite;
    }
    .ring-2 {
      width: 340px; height: 340px;
      transform: translate(-50%, -50%) rotateX(70deg) rotateZ(60deg);
      animation: orbit 28s linear infinite reverse;
      border-color: rgba(14, 165, 233, 0.04);
    }
    .ring-3 {
      width: 400px; height: 400px;
      transform: translate(-50%, -50%) rotateX(55deg) rotateZ(120deg);
      animation: orbit 35s linear infinite;
      border-color: rgba(14, 165, 233, 0.03);
    }

    /* Floating particles on rings */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #0EA5E9;
    }
    .ring-1 .particle { top: -2px; left: 50%; box-shadow: 0 0 8px rgba(14, 165, 233, 0.6); animation: particle-glow 3s ease-in-out infinite; }
    .ring-2 .particle { bottom: -2px; right: 20%; width: 3px; height: 3px; opacity: 0.6; box-shadow: 0 0 6px rgba(14, 165, 233, 0.4); animation: particle-glow 4s ease-in-out infinite 1s; }
    .ring-3 .particle { top: 30%; left: -2px; width: 2px; height: 2px; opacity: 0.4; box-shadow: 0 0 4px rgba(14, 165, 233, 0.3); animation: particle-glow 5s ease-in-out infinite 2s; }

    /* Scattered ambient dots */
    .dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .dot {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(14, 165, 233, 0.15);
    }
    .dot:nth-child(1) { top: 15%; left: 20%; animation: twinkle 4s ease-in-out infinite; }
    .dot:nth-child(2) { top: 25%; right: 15%; animation: twinkle 5s ease-in-out infinite 1s; }
    .dot:nth-child(3) { bottom: 20%; left: 12%; animation: twinkle 6s ease-in-out infinite 0.5s; }
    .dot:nth-child(4) { bottom: 30%; right: 25%; animation: twinkle 4.5s ease-in-out infinite 2s; }
    .dot:nth-child(5) { top: 40%; left: 8%; animation: twinkle 5.5s ease-in-out infinite 1.5s; width: 1px; height: 1px; }
    .dot:nth-child(6) { top: 60%; right: 10%; animation: twinkle 7s ease-in-out infinite 3s; width: 1px; height: 1px; }
    .dot:nth-child(7) { top: 10%; left: 55%; animation: twinkle 6s ease-in-out infinite 0.8s; width: 1.5px; height: 1.5px; }
    .dot:nth-child(8) { bottom: 12%; right: 40%; animation: twinkle 5s ease-in-out infinite 2.5s; }

    @keyframes orb-breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.06); opacity: 0.85; }
    }
    @keyframes core-pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    }
    @keyframes orbit {
      from { transform: translate(-50%, -50%) rotateX(65deg) rotateZ(0deg); }
      to { transform: translate(-50%, -50%) rotateX(65deg) rotateZ(360deg); }
    }
    @keyframes particle-glow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.5; }
    }

    /* === CONTENT === */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
    }

    .brand {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
      opacity: 0;
      animation: fade-up 0.8s ease forwards 0.3s;
    }
    .brand span { color: #0EA5E9; }

    .tagline {
      font-size: 17px;
      font-weight: 400;
      color: #94A3B8;
      line-height: 1.7;
      max-width: 440px;
      margin: 0 auto 36px;
      opacity: 0;
      animation: fade-up 0.8s ease forwards 0.6s;
    }

    .line {
      width: 40px;
      height: 2px;
      background: #0EA5E9;
      margin: 0 auto 36px;
      border-radius: 1px;
      opacity: 0;
      animation: fade-up 0.6s ease forwards 0.8s;
    }

    .cycle-wrap {
      margin-bottom: 44px;
      opacity: 0;
      animation: fade-up 0.8s ease forwards 1.0s;
    }
    .cycle-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 10px;
    }
    .cycle-words {
      height: 30px;
      overflow: hidden;
      position: relative;
    }
    .cycle-track {
      display: flex;
      flex-direction: column;
      animation: scroll-words 10s ease-in-out infinite;
    }
    .cycle-word {
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      color: #0EA5E9;
    }

    @keyframes scroll-words {
      0%, 18% { transform: translateY(0); }
      22%, 38% { transform: translateY(-30px); }
      42%, 58% { transform: translateY(-60px); }
      62%, 78% { transform: translateY(-90px); }
      82%, 100% { transform: translateY(-120px); }
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(14, 165, 233, 0.06);
      border: 1px solid rgba(14, 165, 233, 0.12);
      border-radius: 100px;
      font-size: 13px;
      color: #64748B;
      opacity: 0;
      animation: fade-up 0.8s ease forwards 1.2s;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0EA5E9;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .footer {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: #1E293B;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .brand { font-size: 36px; }
      .tagline { font-size: 15px; max-width: 320px; }
      .orb-container { width: 300px; height: 300px; }
      .orb { width: 140px; height: 140px; }
      .ring-1 { width: 180px; height: 180px; }
      .ring-2 { width: 220px; height: 220px; }
      .ring-3 { width: 260px; height: 260px; }
    }
  </style>
</head>
<body>

  <!-- Ambient dots -->
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <!-- AI Orb -->
  <div class="orb-container">
    <div class="ring ring-1"><div class="particle"></div></div>
    <div class="ring ring-2"><div class="particle"></div></div>
    <div class="ring ring-3"><div class="particle"></div></div>
    <div class="orb"></div>
  </div>

  <!-- Content -->
  <div class="container">
    <h1 class="brand">Vervo <span>AI</span></h1>

    <p class="tagline">
      Banking compliance shouldn't hold your business back. We're building something that makes sure it never does.
    </p>

    <div class="line"></div>

    <div class="cycle-wrap">
      <div class="cycle-label">What we unlock</div>
      <div class="cycle-words">
        <div class="cycle-track">
          <div class="cycle-word">Faster banking access</div>
          <div class="cycle-word">Weeks of KYC in minutes</div>
          <div class="cycle-word">Freedom to focus on growth</div>
          <div class="cycle-word">Every bank, one platform</div>
          <div class="cycle-word">Faster banking access</div>
        </div>
      </div>
    </div>

    <div class="status">
      <div class="status-dot"></div>
      Coming soon
    </div>
  </div>

  <div class="footer">&copy; 2026 Vervo AI</div>
</body>
</html>
