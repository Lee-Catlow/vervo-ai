<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vervo AI</title>
<meta name="description" content="Something is coming. Vervo AI.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08090d;--surface:#0e1017;--accent:#4f6df5;--accent2:#7b5cf7;--glow:rgba(79,109,245,.15);--text:#e8eaf0;--sub:#6b7189;--dim:#2a2d3a}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}

/* ── BACKGROUND ── */
.bg-grid{position:fixed;inset:0;z-index:0;opacity:.04;
  background-image:linear-gradient(var(--dim) 1px,transparent 1px),linear-gradient(90deg,var(--dim) 1px,transparent 1px);
  background-size:60px 60px;
}
.bg-grad{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(79,109,245,.08),transparent 70%),
             radial-gradient(ellipse 60% 50% at 70% 60%,rgba(123,92,247,.06),transparent 60%);
}
.bg-noise{position:fixed;inset:0;z-index:0;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── ORB ── */
.orb-container{position:fixed;top:50%;left:50%;transform:translate(-50%,-55%);z-index:1;width:420px;height:420px;pointer-events:none}
.orb{width:100%;height:100%;border-radius:50%;position:relative;animation:orbFloat 8s ease-in-out infinite}
.orb::before{content:'';position:absolute;inset:-2px;border-radius:50%;
  background:conic-gradient(from 0deg,var(--accent),var(--accent2),transparent,var(--accent));
  animation:orbSpin 12s linear infinite;opacity:.3;filter:blur(30px)}
.orb::after{content:'';position:absolute;inset:20px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(79,109,245,.2),rgba(123,92,247,.1) 50%,transparent 70%);
  backdrop-filter:blur(1px);border:1px solid rgba(79,109,245,.08)}
.orb-ring{position:absolute;inset:-40px;border-radius:50%;border:1px solid rgba(79,109,245,.06);animation:orbSpin 20s linear infinite reverse}
.orb-ring2{position:absolute;inset:-80px;border-radius:50%;border:1px solid rgba(123,92,247,.04);animation:orbSpin 30s linear infinite}
.orb-dot{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:.6}
.orb-dot:nth-child(1){top:10%;left:50%;animation:dotPulse 3s ease-in-out infinite}
.orb-dot:nth-child(2){top:50%;right:8%;animation:dotPulse 3s ease-in-out infinite .5s}
.orb-dot:nth-child(3){bottom:12%;left:30%;animation:dotPulse 3s ease-in-out infinite 1s}

@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
@keyframes orbSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes dotPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.8)}}

/* ── CONTENT ── */
.content{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}

/* Logo */
.logo{margin-bottom:60px;opacity:0;animation:fadeUp .8s ease-out .2s forwards}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(52px,8vw,80px);letter-spacing:-2px;
  background:linear-gradient(135deg,var(--text) 0%,var(--accent) 50%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1}
.logo-ai{font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(52px,8vw,80px);letter-spacing:-2px;
  -webkit-text-fill-color:transparent;background-clip:text;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;opacity:.5;margin-left:8px}

/* Tagline */
.tagline{font-size:clamp(18px,2.5vw,26px);font-weight:200;color:var(--sub);letter-spacing:.5px;max-width:500px;line-height:1.5;
  opacity:0;animation:fadeUp .8s ease-out .5s forwards}

/* Accent line */
.accent-line{width:48px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));margin:32px auto;border-radius:1px;
  opacity:0;animation:fadeUp .8s ease-out .7s forwards}

/* Teaser words */
.teaser{display:flex;gap:28px;margin-top:8px;opacity:0;animation:fadeUp .8s ease-out .9s forwards}
.teaser-word{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--dim);position:relative;padding:8px 0}
.teaser-word::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.3}

/* Status */
.status{margin-top:60px;opacity:0;animation:fadeUp .8s ease-out 1.1s forwards}
.status-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border:1px solid var(--dim);border-radius:100px;font-size:12px;font-weight:400;color:var(--sub);letter-spacing:1px;text-transform:uppercase}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:statusPulse 2s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:.4;box-shadow:0 0 0 0 rgba(79,109,245,.3)}50%{opacity:1;box-shadow:0 0 0 6px rgba(79,109,245,0)}}

/* Floating particles */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;opacity:0;animation:particleFloat linear infinite}
@keyframes particleFloat{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.4}90%{opacity:.4}100%{transform:translateY(-10vh) translateX(40px);opacity:0}}

/* Bottom bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;
  opacity:0;animation:fadeUp .6s ease-out 1.4s forwards}
.bottom-left{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
.bottom-right{font-size:10px;color:var(--dim);letter-spacing:1px}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── CURSOR GLOW (desktop) ── */
.cursor-glow{position:fixed;width:300px;height:300px;border-radius:50%;pointer-events:none;z-index:2;
  background:radial-gradient(circle,rgba(79,109,245,.06),transparent 70%);
  transform:translate(-50%,-50%);transition:left .3s ease-out,top .3s ease-out;display:none}

@media(hover:hover){.cursor-glow{display:block}}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .orb-container{width:280px;height:280px}
  .teaser{gap:16px;flex-wrap:wrap;justify-content:center}
  .bottom-bar{flex-direction:column;gap:8px;text-align:center}
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-grad"></div>
<div class="bg-noise"></div>

<div class="particles" id="particles"></div>

<div class="orb-container">
  <div class="orb">
    <div class="orb-dot"></div>
    <div class="orb-dot"></div>
    <div class="orb-dot"></div>
  </div>
  <div class="orb-ring"></div>
  <div class="orb-ring2"></div>
</div>

<div class="cursor-glow" id="cursorGlow"></div>

<div class="content">
  <div class="logo">
    <span class="logo-text">Vervo</span><span class="logo-ai">AI</span>
  </div>

  <p class="tagline">Something intelligent is taking shape.</p>

  <div class="accent-line"></div>

  <div class="teaser">
    <span class="teaser-word">Think</span>
    <span class="teaser-word">Build</span>
    <span class="teaser-word">Transform</span>
  </div>

  <div class="status">
    <span class="status-badge">
      <span class="status-dot"></span>
      Coming Soon
    </span>
  </div>
</div>

<div class="bottom-bar">
  <span class="bottom-left">Vervo AI · 2026</span>
  <span class="bottom-right">Stay tuned</span>
</div>

<script>
// Particles
const pc=document.getElementById('particles');
for(let i=0;i<20;i++){
  const p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.animationDuration=(8+Math.random()*12)+'s';
  p.style.animationDelay=(Math.random()*10)+'s';
  p.style.width=p.style.height=(1+Math.random()*2)+'px';
  p.style.opacity=String(Math.random()*.3);
  pc.appendChild(p);
}

// Cursor glow
const glow=document.getElementById('cursorGlow');
document.addEventListener('mousemove',e=>{
  glow.style.left=e.clientX+'px';
  glow.style.top=e.clientY+'px';
});
</script>
</body>
</html>
